const fmt$ = (v) => {
  if (v == null || isNaN(v)) return "$0";
  if (v >= 1e9) return `$${(v/1e9).toFixed(2)}B`;
  if (v >= 1e6) return `$${(v/1e6).toFixed(1)}M`;
  if (v >= 1e3) return `$${Math.round(v/1e3)}K`;
  return `$${v.toFixed(0)}`;
};
const fmtN = (v) => {
  if (v == null || isNaN(v)) return "0";
  if (v >= 1e6) return `${(v/1e6).toFixed(1)}M`;
  if (v >= 1e3) return `${Math.round(v/1e3).toLocaleString()}K`;
  return Math.round(v).toLocaleString();
};
const fmtPct = (v) => `${(v||0).toFixed(1)}%`;
const fmtDP = (v) => `$${(v||0).toFixed(2)}`;

// ─── Helpers ──────────────────────────────────────────────────────────────────
const sortedStates = Object.keys(STATE_NAMES).sort((a,b) => STATE_NAMES[a].localeCompare(STATE_NAMES[b]));

function metricRows(m, mode, yesData, noData) {
  if (mode === "total") return [yesData.totals, noData.totals];
  if (mode === "state") {
    const ysc = yesData.state_count, nsc = noData.state_count;
    const yt = yesData.totals, nt = noData.totals;
    const yps = {nt:yt.nt/ysc, tb:yt.tb/ysc, ts:yt.ts/ysc, dp:yt.dp, pb:yt.pb};
    const nps = {nt:nt.nt/nsc, tb:nt.tb/nsc, ts:nt.ts/nsc, dp:nt.dp, pb:nt.pb};
    return [yps, nps];
  }
  // team
  const ytc = yesData.team_count, ntc = noData.team_count;
  const yt = yesData.totals, nt = noData.totals;
  const ypt = {nt:yt.nt/ytc, tb:yt.tb/ytc, ts:yt.ts/ytc, dp:yt.dp, pb:yt.pb};
  const npt = {nt:nt.nt/ntc, tb:nt.tb/ntc, ts:nt.ts/ntc, dp:nt.dp, pb:nt.pb};
  return [ypt, npt];
}

  const isNational = selectedState === "__national__";

  const stateData = useMemo(() => {
    if (isNational) return null;
    return DATA.per_state[selectedState] || null;
  }, [selectedState, isNational]);

  const heroMetrics = useMemo(() => {
    if (isNational) return DATA.national;
    return stateData ? stateData.totals : DATA.national;
  }, [isNational, stateData]);

  const handleStateChange = (e) => {
    setSelectedState(e.target.value);
    setActiveTab("transfer");
  };

  // Transfer tab data
  const yes = DATA.transfer.yes;
  const no = DATA.transfer.no;

  // By league data
  const leagueData = useMemo(() => {
    if (isNational) {
      return Object.entries(DATA.by_league).map(([lg, m]) => ({
        league: lg,
        totals: m,
        isNational: true,
      })).sort((a,b) => b.totals.ts - a.totals.ts);
    }
    if (!stateData) return [];
    return Object.entries(stateData.by_league||{}).map(([lg, m]) => ({
      league: lg,
      totals: m.totals,
      teams: m.teams,
      isNational: false,
    })).sort((a,b) => b.totals.ts - a.totals.ts);
  }, [isNational, stateData]);

  const barData = leagueData.map(d => ({name: d.league, savings: d.totals.ts}));

  // Year trend data
  const yearData = useMemo(() => {
    if (isNational) {
      return Object.entries(DATA.by_year).map(([y, m]) => ({year:y, savings:m.ts, pct:m.pb}));
    }
    if (!stateData) return [];
    return Object.entries(stateData.by_year||{}).map(([y, m]) => ({year:y, savings:m.ts, pct:m.pb}));
  }, [isNational, stateData]);

  // State transfer info
  const stateTransfer = stateData ? stateData.transfer : null;
  const stateName = isNational ? "" : (STATE_NAMES[selectedState] || selectedState);

  // Yes-state avg for delta comparison
  const yesAvgMetrics = {nt: yes.totals.nt/yes.state_count, tb: yes.totals.tb/yes.state_count, ts: yes.totals.ts/yes.state_count, dp: yes.totals.dp, pb: yes.totals.pb};

        {activeTab === "year" && (
          <div>
            <div style={{background:"#F8FAFC", border:"1px solid #E2E8F0", borderRadius:10, padding:"20px", marginBottom:20}}>
              <div style={{fontWeight:700, fontSize:12, textTransform:"uppercase", letterSpacing:"0.08em", color:"#64748B", marginBottom:12}}>Total Fan Savings by Year</div>
              <ResponsiveContainer width="100%" height={220}>
                <LineChart data={yearData} margin={{top:5,right:20,bottom:5,left:10}}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9"/>
                  <XAxis dataKey="year" tick={{fontFamily:"'Montserrat',sans-serif",fontSize:12,fontWeight:700}} axisLine={false} tickLine={false}/>
                  <YAxis tickFormatter={v=>fmt$(v)} tick={{fontFamily:"'Montserrat',sans-serif",fontSize:11}} axisLine={false} tickLine={false}/>
                  <Tooltip formatter={(v)=>fmt$(v)} contentStyle={{borderRadius:8,border:"1px solid #E2E8F0"}}/>
                  <Line type="monotone" dataKey="savings" stroke={GREEN} strokeWidth={3} dot={{r:5,fill:GREEN}} activeDot={{r:7}}/>
                </LineChart>
              </ResponsiveContainer>
              <div style={{textAlign:"center",fontSize:11,color:"#94A3B8",marginTop:8}}>Annual total savings fans captured buying below face value on the secondary market</div>
            </div>
            <div style={{background:"#F8FAFC", border:"1px solid #E2E8F0", borderRadius:10, padding:"20px"}}>
              <div style={{fontWeight:700, fontSize:12, textTransform:"uppercase", letterSpacing:"0.08em", color:"#64748B", marginBottom:12}}>% of Tickets Sold Below Face by Year</div>
              <ResponsiveContainer width="100%" height={220}>
                <LineChart data={yearData} margin={{top:5,right:20,bottom:5,left:10}}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9"/>
                  <XAxis dataKey="year" tick={{fontFamily:"'Montserrat',sans-serif",fontSize:12,fontWeight:700}} axisLine={false} tickLine={false}/>
                  <YAxis tickFormatter={v=>`${v.toFixed(1)}%`} tick={{fontFamily:"'Montserrat',sans-serif",fontSize:11}} axisLine={false} tickLine={false}/>
                  <Tooltip formatter={(v)=>fmtPct(v)} contentStyle={{borderRadius:8,border:"1px solid #E2E8F0"}}/>
                  <Line type="monotone" dataKey="pct" stroke={BLUE} strokeWidth={3} dot={{r:5,fill:BLUE}} activeDot={{r:7}}/>
                </LineChart>
              </ResponsiveContainer>
              <div style={{textAlign:"center",fontSize:11,color:"#94A3B8",marginTop:8}}>Share of all tracked tickets that sold below original face value</div>
            </div>
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{margin:"36px 32px 0 32px", paddingTop:20, borderTop:"1px solid #E2E8F0", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:12}}>
        <div>
          <div style={{fontSize:11, color:"#94A3B8"}}>Source: Secondary market ticket sales from 2021 through 2025</div>
          <div style={{fontSize:11, color:"#94A3B8"}}>© Sports Fans Coalition · sportsfans.org</div>
        </div>
        <div style={{background:ACCENT, color:"#fff", borderRadius:50, padding:"6px 16px", fontSize:12, fontWeight:700, letterSpacing:"0.04em"}}>Every Fan Deserves a Voice</div>
      </div>
    </div>
  );
}


const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(SFCWidget));
</script>
</body>
</html>
